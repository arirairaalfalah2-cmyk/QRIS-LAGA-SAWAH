<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Linktree Style</title>

    <!-- Font Awesome untuk icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #1a1a3e, #24243e);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #f0f0f0;
            --text-secondary: #b0b0b0;
            --tiktok-color: #ff0050;
            --tiktok-glow: rgba(255, 0, 80, 0.5);
            --whatsapp-color: #25d366;
            --whatsapp-glow: rgba(37, 211, 102, 0.5);
            --qris-color: #f5a623;
            --qris-glow: rgba(245, 166, 35, 0.5);
            --border-subtle: rgba(255, 255, 255, 0.1);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-attachment: fixed;
            /* Efek partikel subtle dengan radial gradients */
            position: relative;
            overflow-x: hidden;
        }

        /* Efek orbs di background */
        body::before {
            content: '';
            position: fixed;
            top: -150px;
            left: -100px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 0, 80, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatOrb1 12s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -150px;
            right: -100px;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(37, 211, 102, 0.07) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatOrb2 15s ease-in-out infinite;
        }

        @keyframes floatOrb1 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(40px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        @keyframes floatOrb2 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(-35px, 25px) scale(1.15);
            }
            66% {
                transform: translate(25px, -15px) scale(0.85);
            }
        }

        /* Container utama */
        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-subtle);
            border-radius: 32px;
            padding: 40px 30px 35px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Foto Profil */
        .profile-pic-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg,
                    var(--tiktok-color),
                    var(--whatsapp-color),
                    var(--qris-color));
            animation: borderRotate 4s linear infinite;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        @keyframes borderRotate {
            0% {
                filter: hue-rotate(0deg);
            }
            100% {
                filter: hue-rotate(360deg);
            }
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 3px solid rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .profile-pic:hover {
            transform: scale(1.05);
        }

        /* Nama / Title */
        .profile-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .profile-bio {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 28px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* Divider */
        .divider {
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            margin: 0 auto 24px;
            border-radius: 1px;
        }

        /* Link buttons */
        .link-buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 20px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 15px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            position: relative;
            overflow: hidden;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .link-btn:hover::before {
            width: 600px;
            height: 600px;
        }

        .link-btn:active {
            transform: scale(0.94);
        }

        /* TikTok Button */
        .btn-tiktok {
            background: #111111;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        .btn-tiktok:hover {
            background: #1a1a1a;
            border-color: var(--tiktok-color);
            box-shadow: 0 12px 35px var(--tiktok-glow);
            transform: translateY(-3px);
        }
        .btn-tiktok i {
            color: var(--tiktok-color);
            font-size: 1.4rem;
            transition: transform 0.3s ease;
        }
        .btn-tiktok:hover i {
            transform: rotate(-8deg) scale(1.2);
            animation: tiktokBounce 0.5s ease;
        }
        @keyframes tiktokBounce {
            0%,
            100% {
                transform: rotate(0deg) scale(1);
            }
            40% {
                transform: rotate(-15deg) scale(1.3);
            }
            70% {
                transform: rotate(5deg) scale(0.9);
            }
        }

        /* WhatsApp Button */
        .btn-whatsapp {
            background: #111111;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        .btn-whatsapp:hover {
            background: #1a1a1a;
            border-color: var(--whatsapp-color);
            box-shadow: 0 12px 35px var(--whatsapp-glow);
            transform: translateY(-3px);
        }
        .btn-whatsapp i {
            color: var(--whatsapp-color);
            font-size: 1.4rem;
            transition: transform 0.3s ease;
        }
        .btn-whatsapp:hover i {
            animation: waPulse 0.6s ease infinite;
        }
        @keyframes waPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
        }

        .btn-label {
            flex: 1;
            text-align: left;
            font-weight: 500;
        }

        .btn-arrow {
            opacity: 0.5;
            transition: all 0.3s ease;
            font-size: 0.8rem;
        }
        .link-btn:hover .btn-arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        /* QRIS Button */
        .btn-qris {
            width: 100%;
            background: linear-gradient(135deg, #1a1a2e, #1f1f35);
            border: 2px solid rgba(245, 166, 35, 0.4);
            padding: 16px 24px;
            border-radius: 50px;
            color: #f5a623;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .btn-qris::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50px;
            background: linear-gradient(135deg,
                    rgba(245, 166, 35, 0.1),
                    rgba(255, 200, 50, 0.05));
            opacity: 0;
            transition: opacity 0.35s ease;
        }
        .btn-qris:hover {
            border-color: var(--qris-color);
            box-shadow: 0 14px 40px var(--qris-glow);
            transform: translateY(-3px);
            color: #ffc850;
        }
        .btn-qris:hover::after {
            opacity: 1;
        }
        .btn-qris:active {
            transform: scale(0.95);
        }
        .btn-qris i {
            margin-right: 8px;
            animation: sparkle 2s ease-in-out infinite;
        }
        @keyframes sparkle {
            0%,
            100% {
                opacity: 0.6;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* ==================== MODAL QRIS ==================== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-dialog {
            background: linear-gradient(160deg, #1a1a2e, #16213e, #1a1a2e);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 30px 25px 25px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
            transform: translateY(40px) scale(0.9);
            transition: all 0.45s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            position: relative;
        }

        .modal-overlay.active .modal-dialog {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f0f0f0;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-title i {
            color: var(--qris-color);
        }

        .modal-close {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
        }
        .modal-close:hover {
            background: rgba(255, 50, 50, 0.2);
            border-color: rgba(255, 80, 80, 0.5);
            color: #ff5555;
            transform: rotate(90deg);
        }

        .qris-image-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
            background: #fff;
            padding: 10px;
        }
        .qris-image-wrapper:hover {
            border-color: rgba(245, 166, 35, 0.5);
            box-shadow: 0 15px 40px var(--qris-glow);
        }

        .qris-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
        }

        .qris-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 14px;
            padding: 8px 18px;
            border-radius: 50px;
            background: rgba(245, 166, 35, 0.1);
            border: 1px solid rgba(245, 166, 35, 0.3);
            color: #f5a623;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Footer */
        .footer-text {
            margin-top: 18px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 450px) {
            .main-container {
                padding: 30px 18px 28px;
                border-radius: 24px;
            }
            .profile-pic-wrapper {
                width: 100px;
                height: 100px;
                margin-bottom: 16px;
            }
            .profile-name {
                font-size: 1.3rem;
            }
            .link-btn {
                padding: 13px 18px;
                font-size: 0.9rem;
                gap: 8px;
            }
            .btn-qris {
                padding: 14px 18px;
                font-size: 0.9rem;
                letter-spacing: 1.5px;
            }
            .modal-dialog {
                padding: 22px 16px 18px;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== MAIN CONTAINER ==================== -->
    <div class="main-container">

        <!-- Foto Profil -->
        <div class="profile-pic-wrapper">
            <img
            class="profile-pic"
            src="profile.png"
            alt="Foto Profil"
            loading="lazy"
            >
        </div>

        <!-- Nama / Bio -->
        <h2 class="profile-name">LAGA SAWAH BEARZ</h2>
        
        <!-- Divider -->
        <div class="divider"></div>

        <!-- Link Buttons -->
        <div class="link-buttons">

            <!-- Tombol TikTok -->
            <a
            href="https://www.tiktok.com/@lagasawahbearz"
            target="_blank"
            rel="noopener noreferrer"
            class="link-btn btn-tiktok"
            title="Kunjungi TikTok"
            >
            <i class="fa-brands fa-tiktok"></i>
            <span class="btn-label">TikTok</span>
            <span class="btn-arrow"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
        </a>

        <!-- Tombol WhatsApp -->
        <a
        href="https://chat.whatsapp.com/KuofjbAiHsnGtVJTFkLeqL?s=cl&p=a&ilr=2"
        target="_blank"
        rel="noopener noreferrer"
        class="link-btn btn-whatsapp"
        title="Gabung Grup WhatsApp"
        >
        <i class="fa-brands fa-whatsapp"></i>
        <span class="btn-label">WhatsApp Group</span>
        <span class="btn-arrow"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
    </a>

</div>

<!-- Tombol QRIS -->
<button class="btn-qris" id="btnQris" title="Tampilkan QRIS All Payment">
    <i class="fa-solid fa-qrcode"></i> TAMPILKAN QRIS
</button>

<!-- Footer kecil -->
<p class="footer-text">Scan & Pay • All Payment Supported</p>
</div>

<!-- ==================== MODAL QRIS ==================== -->
<div class="modal-overlay" id="modalQris">
    <div class="modal-dialog">
        <!-- Header Modal -->
        <div class="modal-header">
            <span class="modal-title">
                <i class="fa-solid fa-qrcode"></i> QRIS All Payment
            </span>
            <button class="modal-close" id="btnCloseModal" title="Tutup">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <!-- Gambar QRIS -->
        <div class="qris-image-wrapper">
            <!-- GANTI src di bawah ini dengan URL gambar QRIS kamu -->
            <img
            class="qris-image"
            src="qris.jpeg"
            alt="QRIS All Payment"
            loading="lazy"
            >
        </div>

        <!-- Badge -->
        <div class="qris-badge">
            <i class="fa-solid fa-check-circle"></i>
            Support Semua Pembayaran
        </div>
    </div>
</div>

<!-- ==================== JAVASCRIPT ==================== -->
<script>
    (function() {
        // Ambil elemen
        const btnQris = document.getElementById('btnQris');
        const modalQris = document.getElementById('modalQris');
        const btnCloseModal = document.getElementById('btnCloseModal');

        // Fungsi buka modal
        function openModal() {
            modalQris.classList.add('active');
            document.body.style.overflow = 'hidden'; // cegah scroll di belakang
        }

        // Fungsi tutup modal
        function closeModal() {
            modalQris.classList.remove('active');
            document.body.style.overflow = ''; // kembalikan scroll
        }

        // Event: klik tombol QRIS
        btnQris.addEventListener('click', openModal);

        // Event: klik tombol close (X)
        btnCloseModal.addEventListener('click', closeModal);

        // Event: klik di luar modal (overlay)
        modalQris.addEventListener('click', function(event) {
            // Jika yang diklik adalah overlay (bukan modal-dialog)
            if (event.target === modalQris) {
                closeModal();
            }
        });

        // Event: tekan tombol Escape untuk tutup modal
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape' && modalQris.classList.contains('active')) {
                closeModal();
            }
        });

        // Animasi ripple mini saat klik button QRIS
        btnQris.addEventListener('mousedown', function(e) {
